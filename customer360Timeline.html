<template>

    <lightning-card title="Customer Timeline">

        <template lwc:if={timeline}>

            <div class="slds-p-around_medium">

                <template
                    for:each={timeline}
                    for:item="item">

                    <div
                        key={item.title}
                        class="slds-box slds-m-bottom_small">

                        <lightning-icon
                            icon-name="utility:record"
                            size="small">
                        </lightning-icon>

                        <p class="slds-m-top_small">
                            <strong>{item.type}</strong>
                        </p>

                        <p>
                            {item.title}
                        </p>

                        <p class="slds-text-color_weak">
                            {item.activityDate}
                        </p>

                    </div>

                </template>

            </div>

        </template>

    </lightning-card>

</template>
